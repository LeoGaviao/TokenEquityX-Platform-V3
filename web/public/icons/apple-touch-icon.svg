<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Apple touch icon: iOS rounds corners automatically, but include rx for browsers -->
  <rect width="180" height="180" rx="40" fill="#1A1F2E"/>
  <!-- Gold hexagon r=56, center 90,90 -->
  <!-- 0°:(146,90) 60°:(118,138.5) 120°:(62,138.5) 180°:(34,90) 240°:(62,41.5) 300°:(118,41.5) -->
  <polygon points="146,90 118,138.5 62,138.5 34,90 62,41.5 118,41.5" fill="#C8972B"/>
  <!-- Navy inner hexagon r=35 -->
  <!-- 0°:(125,90) 60°:(107.5,120.3) 120°:(72.5,120.3) 180°:(55,90) 240°:(72.5,59.7) 300°:(107.5,59.7) -->
  <polygon points="125,90 107.5,120.3 72.5,120.3 55,90 72.5,59.7 107.5,59.7" fill="#1A1F2E"/>
  <!-- T lettermark -->
  <rect x="74" y="68" width="32" height="7" rx="2" fill="#C8972B"/>
  <rect x="87" y="75" width="7" height="42" rx="2" fill="#C8972B"/>
</svg>
