<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Navy background -->
  <rect width="512" height="512" rx="80" fill="#1A1F2E"/>
  <!-- Gold flat-top regular hexagon, radius 160, centered at 256,256 -->
  <!-- Flat-top: vertices at angles 0,60,120,180,240,300 degrees -->
  <!-- r=160: points are (256+160*cos(a), 256+160*sin(a)) -->
  <!-- 0°: (416,256), 60°: (336,394.9), 120°: (176,394.9), 180°: (96,256), 240°: (176,117.1), 300°: (336,117.1) -->
  <polygon points="416,256 336,394.9 176,394.9 96,256 176,117.1 336,117.1" fill="#C8972B"/>
  <!-- Navy inner hexagon for depth (radius 100) -->
  <polygon points="356,256 296,359.3 196,359.3 136,256 196,152.7 296,152.7" fill="#1A1F2E"/>
  <!-- Gold "T" lettermark centered -->
  <rect x="216" y="196" width="80" height="16" rx="4" fill="#C8972B"/>
  <rect x="248" y="212" width="16" height="100" rx="4" fill="#C8972B"/>
</svg>
