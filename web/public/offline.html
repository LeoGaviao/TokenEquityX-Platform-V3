<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline — TokenEquityX</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#1A1F2E;color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:24px;text-align:center;
    }
    .icon{margin-bottom:24px}
    h1{font-size:1.5rem;font-weight:800;margin-bottom:12px}
    p{color:#94a3b8;font-size:0.9rem;line-height:1.6;max-width:300px;margin:0 auto 28px}
    button{
      background:#C8972B;color:#fff;border:none;
      padding:12px 28px;border-radius:10px;
      font-size:0.95rem;font-weight:600;cursor:pointer;
    }
    button:active{opacity:0.85}
  </style>
</head>
<body>
  <div class="icon">
    <svg width="80" height="80" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="80" fill="#1A1F2E"/>
      <polygon points="416,256 336,394.9 176,394.9 96,256 176,117.1 336,117.1" fill="#C8972B"/>
      <polygon points="356,256 296,359.3 196,359.3 136,256 196,152.7 296,152.7" fill="#1A1F2E"/>
      <rect x="216" y="196" width="80" height="16" rx="4" fill="#C8972B"/>
      <rect x="248" y="212" width="16" height="100" rx="4" fill="#C8972B"/>
    </svg>
  </div>
  <h1>You're offline</h1>
  <p>Check your internet connection. Your portfolio data will reload automatically once you're back online.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
