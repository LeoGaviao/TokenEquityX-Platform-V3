version: '3.8'

services:

  # ─── MySQL Database ───────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: tokenequityx_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: tokenequityx
      MYSQL_DATABASE: tokenequityx_v2
      MYSQL_USER: txuser
      MYSQL_PASSWORD: txpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: tokenequityx_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: db
      DB_USER: txuser
      DB_PASSWORD: txpassword
      DB_NAME: tokenequityx_v2
      JWT_SECRET: change-this-to-a-long-random-secret-in-production
      JWT_EXPIRES_IN: 24h
      FRONTEND_URL: http://localhost:3000
      PLATFORM_FEE_BPS: 50
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs

  # ─── Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ../tokenequityx-web-v2
      dockerfile: Dockerfile.web
    container_name: tokenequityx_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    depends_on:
      - api

volumes:
  db_data: